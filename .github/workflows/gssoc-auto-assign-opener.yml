name: GSSoC / Auto-assign issue opener

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to opener
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const opener = context.payload.issue.user.login;
            const number = context.payload.issue.number;
            const OWNER  = 'Karanjot786';
            const MAX_OPEN = 2;

            // Skip bots
            if (opener.endsWith('[bot]')) return;

            // Skip repo owner
            if (opener === OWNER) return;

            // Cap: max 2 open issues assigned per contributor
            const { owner, repo } = context.repo;
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open assignee:${opener}`,
              per_page: 100,
            });
            const openAssigned = search.data.items
              .filter(i => i.number !== number)
              .map(i => `#${i.number}`);

            if (openAssigned.length >= MAX_OPEN) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body: [
                  `Hi @${opener}. You already have ${openAssigned.length} open issues assigned: ${openAssigned.join(', ')}.`,
                  ``,
                  `Open and merge a PR from one of those first, then comment here to claim this issue.`,
                  ``,
                  `This keeps work moving and gives every contributor a fair chance.`,
                ].join('\n'),
              });
              core.info(`@${opener} at cap (${openAssigned.length}); not assigning.`);
              return;
            }

            // Assign + label
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: number,
              assignees: [opener],
            });
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: number,
              labels: ['assigned'],
            });

            const due = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000)
              .toISOString().slice(0, 10);

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: number,
              body: [
                `✅ Auto-assigned to @${opener} (issue opener).`,
                ``,
                `Open your PR by **${due}** (7 days). The bot frees this issue for another contributor after that date.`,
                ``,
                `**Reminders:**`,
                `- ⭐ Star the repo first. The \`star-check\` job blocks your merge otherwise.`,
                `- PR title: \`type: short description\``,
                `- Link this issue in your PR body: \`Closes #${number}\``,
                ``,
                `Good luck. 🚀`,
              ].join('\n'),
            });
